; PlatformIO Project Configuration File
; Warbler32 - RTSP Audio Streamer for ESP32-S3-DevKitC-1 boards
;
; PSRAM bus mode (Quad/Octal) and flash size vary across ESP32-S3 board
; variants (e.g. N8R2 vs N16R8) and are auto-detected at build time by
; scripts/detect_board.py — see that file for how/why. The values below are
; only the fallback used if a board isn't detected yet (e.g. `pio run`
; without a board plugged in).

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf

extra_scripts = pre:scripts/detect_board.py

; Fallback (N8R2-equivalent): 8MB flash, 2MB Quad PSRAM.
board_build.partitions = default_8MB.csv
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS=sdkconfig.defaults;sdkconfig.defaults.quad

; USB Serial/JTAG on ESP32-S3 (no external USB-UART needed)
upload_protocol = esptool
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

build_unflags = -Werror
build_flags =
    -DBOARD_HAS_PSRAM
